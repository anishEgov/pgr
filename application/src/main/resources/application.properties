# No global context path: each module keeps its OWN API path via per-module path prefixes
# (see Application.configurePathMatch). pgr is a peer module, not the app's context root.
server.port=8280
app.timezone=UTC

# KAFKA SERVER CONFIGURATIONS
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=egov-pgr-services
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# KAFKA CONSUMER CONFIGURATIONS
kafka.consumer.config.auto_commit=true
kafka.consumer.config.auto_commit_interval=100
kafka.consumer.config.session_timeout=15000
kafka.consumer.config.auto_offset_reset=earliest
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# KAFKA PRODUCER CONFIGURATIONS
kafka.producer.config.retries_config=0
kafka.producer.config.batch_size_config=16384
kafka.producer.config.linger_ms_config=1
kafka.producer.config.buffer_memory_config=33554432
#org.egov.detailed.tracing.enabled = false

# [runtime] points at docker-compose Postgres (platform-postgres, host port 5433, db 'platform')
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5433/platform
spring.datasource.username=postgres
spring.datasource.password=postgres

# Disable Spring Boot's auto-Flyway for the first boot (flyway-core is on the classpath via
# several modules; default behavior would scan classpath:db/migration/** and run ALL modules'
# migrations with possibly clashing versions). Schema is created separately (see schema bootstrap).
spring.flyway.enabled=false
flyway.url=jdbc:postgresql://localhost:5433/platform
flyway.user=postgres
flyway.password=postgres
flyway.table=public
flyway.baseline-on-migrate=true
flyway.outOfOrder=true
flyway.locations=classpath:/db/migration/pgr
flyway.enabled=false
# [runtime] Kafka broker exposed by docker-compose (EXTERNAL listener)
spring.kafka.bootstrap-servers=localhost:9092

# [runtime] Each former service defined its own infra @Bean methods with identical names
# (objectMapper, jacksonConverter, restTemplate, kafka templates...). @Bean names ignore the
# component-scan name generator, so they collide in one context. Allow overriding so the merged
# app boots (last definition wins). These infra beans are equivalent across modules; deduplicating
# them into one shared config is a clean-up follow-up.
spring.main.allow-bean-definition-overriding=true


# ======================================================================================
# [Phase 1] idgen module (former egov-idgen). Functional keys read by PropertiesManager /
# IdGenerationService / MdmsService. Datasource, server.port and context-path are NOT copied:
# the modulith has ONE datasource (D4) and ONE web context. idgen's own db/migration files
# live under db/migration/idgen for ownership (flyway disabled here, schema managed externally).
# ======================================================================================
invalid.input=Invalid input
id.generation.table=id_generator
id.sequence.overflow=IDSeqOverFlow
id.sequence.notfound=IDSeqNotFound
id.invalid.format=InvalidIDFormat
success=SUCCESSFULL
failed=FAILED
city.code.notfound=CityCodeNotFound
# [runtime test] use the format PGR passes (PB-PGR-...-[SEQ_EG_PGR_ID]) instead of looking it up
# in MDMS (no idgen-format master seeded locally), and let idgen auto-create the DB sequence.
idformat.from.mdms=false
autocreate.new.seq=false
autocreate.request.seq=true
id.timezone=IST
# idgen's own MDMS lookup (kept as HTTP for now; becomes in-process in Phase 2 — mdms module)
mdms.service.host=http://localhost:8082/
mdms.service.search.uri=egov-mdms-service/v1/_search


# ======================================================================================
# [Phase 2] mdms module (former mdms-v2). Functional keys read by its config/producer/service.
# app.timezone + kafka.config.bootstrap_server_config already exist above (shared infra).
# Datasource/server/context-path NOT copied (one of each in the modulith).
# ======================================================================================
egov.mdms.schema.definition.save.topic=save-mdms-schema-definition
egov.mdms.data.save.topic=save-mdms-data
egov.mdms.data.update.topic=update-mdms-data
mdms.default.offset=0
mdms.default.limit=10


# ======================================================================================
# [Phase 3] localization module (former egov-localization). JPA runs over the ONE shared
# datasource (D4); ddl-auto=none (schema external). Redis is required at runtime for its
# message cache. Datasource/app.timezone already defined above.
# ======================================================================================
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database=postgresql
spring.redis.host=localhost
spring.redis.port=6379


# ======================================================================================
# [Phase 4] workflow module (former egov-workflow-v2). Only workflow-UNIQUE keys are added;
# shared keys (app.timezone, kafka bootstrap, egov.mdms.host, egov.user.host) already exist
# above and are intentionally single-valued in the modulith (D7). workflow's own internal
# calls to user/mdms still go over HTTP (port-forward) for now.
# ======================================================================================
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=egov-wf-services
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false
kafka.consumer.config.auto_commit=true
kafka.consumer.config.auto_commit_interval=100
kafka.consumer.config.session_timeout=15000
kafka.consumer.config.auto_offset_reset=earliest
persister.save.transition.wf.topic=save-wf-transitions
persister.save.businessservice.wf.topic=save-wf-businessservice
persister.update.businessservice.wf.topic=update-wf-businessservice
# leading slash required: workflow builds host+endpoint directly, and the merged egov.user.host
# has no trailing slash (standalone wf's host did). Without it the URL became ".../8081user/_search".
egov.user.search.endpoint=/user/_search
egov.wf.fuzzysearch.isFuzzyEnabled=true
egov.wf.default.offset=0
egov.wf.default.limit=10
egov.wf.max.limit=100
egov.wf.inbox.assignedonly=false
cache.expiry.workflow.minutes=15
state.level.tenant.id=pg
egov.wf.escalation.batch.size=50
state.level.tenantid.length=2
is.environment.central.instance=true


#Localization config
#egov.localization.host=https://dev.digit.org
egov.localization.host=http://localhost:8087
egov.localization.workDir.path=/localization/messages/v1
egov.localization.context.path=/localization/messages/v1
egov.localization.search.endpoint=/_search
egov.localization.statelevel=true

#mdms urls
#egov.mdms.host=http://localhost:8083
egov.mdms.host=http://localhost:8082
egov.mdms.search.endpoint=/egov-mdms-service/v1/_search

#hrms urls
egov.hrms.host=https://pgr-demo.digit.org
egov.hrms.search.endpoint=/egov-hrms/employees/_search

#User config
egov.user.host=http://localhost:8081
#egov.user.host=http://localhost:8281
egov.user.context.path=/user/users
egov.user.create.path=/_createnovalidate
egov.user.search.path=/user/_search
egov.user.update.path=/_updatenovalidate
egov.internal.microservice.user.uuid=4fef6612-07a8-4751-97e9-0e0ac0687ebe

#Idgen Config
#egov.idgen.host=http://localhost:8085/
egov.idgen.host=http://localhost:8083/
egov.idgen.path=egov-idgen/id/_generate
egov.idgen.pgr.serviceRequestId.name=pgr.servicerequestid
egov.idgen.pgr.serviceRequestId.format=PB-PGR-[cy:yyyy-MM-dd]-[SEQ_EG_PGR_ID]

#Workflow config
is.workflow.enabled=true
pgr.business.codes=PGR
#egov.workflow.host=http://localhost:8282
egov.workflow.host=http://localhost:8084
egov.workflow.transition.path=/egov-workflow-v2/egov-wf/process/_transition
egov.workflow.businessservice.search.path=/egov-workflow-v2/egov-wf/businessservice/_search
egov.workflow.processinstance.search.path=/egov-workflow-v2/egov-wf/process/_search

#PGR Varaibles
pgr.complain.idle.time=864000000
pgr.kafka.create.topic=save-pgr-request
pgr.kafka.update.topic=update-pgr-request
pgr.default.offset=0
pgr.default.limit=100
pgr.search.max.limit=200
pgr.kafka.create.inbox.topic=inbox-pgr-events
pgr.kafka.update.inbox.topic=inbox-pgr-events
kafka.topics.complaints.domain.events=complaints.domain.events
complaints.domain.events.enabled=true
complaints.domain.events.default.locale=en_IN

#Notification
notification.sms.enabled=true
egov.user.event.notification.enabled=true
egov.usr.events.create.topic=persist-user-events-async
kafka.topics.notification.sms=egov.core.notification.sms
mseva.mobile.app.download.link=https://play.google.com/store/apps/details?id=org.egovernment.mseva.citizen
egov.pgr.events.rate.link=digit-ui/citizen/pgr/rate/{application-id}
egov.pgr.events.reopen.link=digit-ui/citizen/pgr/reopen/{application-id}

egov.usr.events.rate.code=RATE
egov.usr.events.reopen.code=REOPEN
egov.ui.app.host.map={"pg":"https://unified-dev.digit.org"}

#url shortner
egov.url.shortner.host=https://unified-dev.digit.org
egov.url.shortner.endpoint=/egov-url-shortening/shortener

#Search parameter Config
citizen.allowed.search.params=serviceRequestId,ids,mobileNumber,applicationStatus,tenantId
employee.allowed.search.params=serviceRequestId,ids,mobileNumber,serviceCode,applicationStatus,tenantId

#Sources
allowed.source=whatsapp,web,mobile,RB Bot

#Migration
persister.save.transition.wf.topic=save-wf-transitions
pgr.kafka.migration.topic=pgr-migration
#pgr.statelevel.tenantid=pb
pgr.business.level.sla=432000000
migration.enabled = false

#Persist batches of records in migration
pgr.kafka.migration.persister.topic = save-pgr-request-batch
persister.save.transition.wf.migration.topic=save-wf-transitions-batch


# central-instance configs
